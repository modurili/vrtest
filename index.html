// ============================================================
// Music import + analysis (BPM detection + onset detection)
// ============================================================
['dragover', 'dragenter'].forEach(evt => importBox.addEventListener(evt, (e) => {
  e.preventDefault(); importBox.classList.add('dragover');
}));
['dragleave', 'drop'].forEach(evt => importBox.addEventListener(evt, (e) => {
  e.preventDefault(); importBox.classList.remove('dragover');
}));
importBox.addEventListener('drop', (e) => {

  if (files.length) handleImportedFiles(files);
});
fileInput.addEventListener('change', (e) => {
  const files = [...e.target.files];

async function handleImportedFiles(files) {
  for (const file of files) {
    importStatus.textContent = `解析中: ${file.name} ...`;
    try {
      const song = await analyzeAudioFile(file);
      allSongs.push(song);
      renderSongChoices();
      selectedSong = song;
      renderSongChoices();
      const item = document.createElement('div');
      item.style.cssText = 'font-size:0.82em; color:#8f8; text-align:left;';
      item.textContent = `✓ ${song.title} — BPM${Math.round(song.bpm)} / ${genreLabel(song.genre)} / ノーツ${song.analyzedNoteCount}個検出`;
      importedSongsListEl.appendChild(item);
      importStatus.textContent = `解析完了: ${file.name}`;
    } catch (err) {
      console.error(err);
      importStatus.textContent = `解析失敗: ${file.name} (${err.message})`;
    }
  }
}

function genreLabel(g) {
  return { rock: 'ロック', punk: 'パンク', hardrock: 'ハードロック' }[g] || 'ロック';
}

// --- FFT (iterative radix-2, in-place) ---
function fftInPlace(real, imag) {
  const n = real.length;
  for (let i = 1, j = 0; i < n; i++) {
    let bit = n >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) {
      [real[i], real[j]] = [real[j], real[i]];
      [imag[i], imag[j]] = [imag[j], imag[i]];
    }
  }
  for (let len = 2; len <= n; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wr = Math.cos(ang), wi = Math.sin(ang);
    for (let i = 0; i < n; i += len) {
      let curWr = 1, curWi = 0;
      for (let j = 0; j < len / 2; j++) {
        const ur = real[i + j], ui = imag[i + j];
        const vr = real[i + j + len/2] * curWr - imag[i + j + len/2] * curWi;
        const vi = real[i + j + len/2] * curWi + imag[i + j + len/2] * curWr;
        real[i + j] = ur + vr; imag[i + j] = ui + vi;
        real[i + j + len/2] = ur - vr; imag[i + j + len/2] = ui - vi;
        const nWr = curWr * wr - curWi * wi;
        const nWi = curWr * wi + curWi * wr;
        curWr = nWr; curWi = nWi;
      }
    }
  }
}

function mixToMono(audioBuffer) {
  const len = audioBuffer.length;
  const result = new Float32Array(len);
  const chCount = audioBuffer.numberOfChannels;
  for (let ch = 0; ch < chCount; ch++) {
    const data = audioBuffer.getChannelData(ch);
    for (let i = 0; i < len; i++) result[i] += data[i] / chCount;
  }
  return result;
}

// Band-split onset detection: low(tom/floor), mid(snare), high(hihat/cymbal)
function detectOnsetsAndBpm(channelData, sampleRate) {
  const fftSize = 2048;
  const hopSize = 512;
  const numFrames = Math.floor((channelData.length - fftSize) / hopSize);

  const hann = new Float32Array(fftSize);
  for (let i = 0; i < fftSize; i++) hann[i] = 0.5 - 0.5 * Math.cos(2 * Math.PI * i / (fftSize - 1));

  const bands = { low: [20, 150], mid: [150, 1200], high: [3000, 10000] };
  const bandBins = {};
  for (const [name, [lo, hi]] of Object.entries(bands)) {
    bandBins[name] = [Math.max(1, Math.floor(lo * fftSize / sampleRate)), Math.min(fftSize/2 - 1, Math.ceil(hi * fftSize / sampleRate))];
  }

  const real = new Float32Array(fftSize);
  const imag = new Float32Array(fftSize);
  let prevEnergy = { low: 0, mid: 0, high: 0 };
  const flux = { low: [], mid: [], high: [] };

  for (let frame = 0; frame < numFrames; frame++) {
    const offset = frame * hopSize;
    for (let i = 0; i < fftSize; i++) {
      real[i] = channelData[offset + i] * hann[i];
      imag[i] = 0;
    }
    fftInPlace(real, imag);
    for (const [name, [loBin, hiBin]] of Object.entries(bandBins)) {
      let energy = 0;
      for (let b = loBin; b < hiBin; b++) energy += Math.sqrt(real[b]*real[b] + imag[b]*imag[b]);
      const diff = Math.max(0, energy - prevEnergy[name]);
      flux[name].push(diff);
      prevEnergy[name] = energy;
    }
  }

  const onsets = [];
  for (const bandName of ['low', 'mid', 'high']) {
    const series = flux[bandName];
    const mean = series.reduce((a,b)=>a+b,0) / series.length;
    const std = Math.sqrt(series.reduce((a,b)=>a+(b-mean)**2,0) / series.length);
    const threshold = mean + std * 1.3;
    let lastOnsetFrame = -10;
    for (let i = 2; i < series.length - 2; i++) {
      if (series[i] > threshold && series[i] >= series[i-1] && series[i] >= series[i+1] && (i - lastOnsetFrame) > 3) {
        onsets.push({ time: (i * hopSize) / sampleRate, band: bandName, strength: series[i] / (mean + 0.0001) });
        lastOnsetFrame = i;
      }
    }
  }
  onsets.sort((a,b) => a.time - b.time);

  // BPM via inter-onset interval histogram (all bands combined, weighted toward low+mid for beat tracking)
  const beatOnsets = onsets.filter(o => o.band === 'low' || o.band === 'mid').map(o => o.time);
  const times = beatOnsets.length > 8 ? beatOnsets : onsets.map(o => o.time);
  const intervals = [];
  for (let i = 0; i < times.length; i++) {
    for (let j = i+1; j < Math.min(i+8, times.length); j++) {
      const dt = times[j] - times[i];
      if (dt > 0.2 && dt < 1.5) intervals.push(dt);
    }
  }
  let bpm = 120;
  if (intervals.length > 0) {
    const votes = {};
    intervals.forEach(dt => {
      let b = 60 / dt;
      while (b < 80) b *= 2;
      while (b > 180) b /= 2;
      const bucket = Math.round(b);
      votes[bucket] = (votes[bucket] || 0) + 1;
    });
    let bestBpm = 120, bestVotes = 0;
    for (const [b, v] of Object.entries(votes)) if (v > bestVotes) { bestVotes = v; bestBpm = Number(b); }
    bpm = bestBpm;
  }

  return { onsets, bpm };
}

async function analyzeAudioFile(file) {
  const arrayBuffer = await file.arrayBuffer();
  const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
  const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
  const mono = audioBuffer.numberOfChannels > 1 ? mixToMono(audioBuffer) : audioBuffer.getChannelData(0);

  const { onsets, bpm } = detectOnsetsAndBpm(mono, audioBuffer.sampleRate);

  // Map band -> lane using real-drum-like assignment:
  // low -> floortom/tom (toms), mid -> snare, high -> hihat/crash/ride
  const laneNotes = onsets.map(o => {
    let lane;
    if (o.band === 'low') {
      lane = Math.random() < 0.5 ? 'floortom' : 'tom2';
    } else if (o.band === 'mid') {
      lane = 'snare';
    } else {
      lane = o.strength > 3.5 ? 'crash' : (Math.random() < 0.7 ? 'hihat' : 'ride');
    }
    return { time: o.time, lane, judged: false, hit: false };
  });

  // De-duplicate: merge onsets within 40ms across bands (keep the strongest / prioritize snare)
  laneNotes.sort((a,b) => a.time - b.time);
  const merged = [];
  laneNotes.forEach(n => {
    const last = merged[merged.length - 1];
    if (last && Math.abs(n.time - last.time) < 0.04) return; // skip near-duplicate
    merged.push(n);
  });

  // decode object URL for playback
  const objectUrl = URL.createObjectURL(file);

  return {
    id: 'import_' + Date.now() + '_' + Math.random().toString(36).slice(2,8),
    title: file.name.replace(/\.[^.]+$/, ''),
    subtitle: 'インポート曲',
    bpm,
    genre: bpm >= 145 ? 'punk' : (bpm < 110 ? 'hardrock' : 'rock'),
    builtin: false,
    audioUrl: objectUrl,
    duration: audioBuffer.duration,
    analyzedNotes: merged,
    analyzedNoteCount: merged.length
  };
}

// ============================================================
// Three.js / WebXR setup
// ============================================================
let scene, camera, renderer;
let controller0, controller1, controllerGrip0, controllerGrip1;
const clock = new THREE.Clock();

// Drum kit WITHOUT kick (VR-incompatible), real acoustic layout
const drumDefs = [
  { name: 'snare',   pos: [0, 0.85, -0.45], radius: 0.18, color: 0xdedede, type: 'snare',   lane: 'snare' },
  { name: 'tom1',    pos: [-0.22, 0.95, -0.68], radius: 0.15, color: 0xffffff, type: 'tom', pitch: 1.25, lane: 'tom1' },
  { name: 'tom2',    pos: [0.18, 0.92, -0.72], radius: 0.16, color: 0xffffff, type: 'tom', pitch: 0.9, lane: 'tom2' },
  { name: 'floorTom',pos: [0.55, 0.55, -0.25], radius: 0.20, color: 0x8b5a2b, type: 'floortom', lane: 'floortom' },
  { name: 'hihat',   pos: [-0.55, 0.95, -0.15], radius: 0.16, color: 0xC0C0C0, type: 'hihat', lane: 'hihat' },
  { name: 'crash',   pos: [-0.55, 1.35, -0.55], radius: 0.20, color: 0xffd76a, type: 'cymbal', pitch: 1.15, lane: 'crash' },
  { name: 'ride',    pos: [0.65, 1.25, -0.65], radius: 0.22, color: 0xffd76a, type: 'cymbal', pitch: 0.85, lane: 'ride' }
];
const drumMeshes = [];
const laneMap = {};

// ============================================================
// Audio engine
// ============================================================
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playDrumSound(type, velocity = 1.0, pitch = 1.0) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const vol = Math.min(1.0, 0.4 + velocity * 0.6);

  if (type === 'snare') {
    const bufferSize = audioCtx.sampleRate * 0.2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 1000;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(vol, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    noise.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 0.2);

    const osc = audioCtx.createOscillator();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(200, t);
    const oscGain = audioCtx.createGain();
    oscGain.gain.setValueAtTime(vol*0.5, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscGain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.12);
  } else if (type === 'tom' || type === 'floortom') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const baseFreq = (type === 'floortom' ? 90 : 180) * pitch;
    osc.frequency.setValueAtTime(baseFreq, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, t + 0.25);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.45);
  } else if (type === 'hihat') {
    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random()*2-1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 7000;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol*0.7, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    noise.connect(filter).connect(g).connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 0.1);
  } else if (type === 'cymbal') {
    const bufferSize = audioCtx.sampleRate * 1.0;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 2);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 6000 * pitch; filter.Q.value = 0.6;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol*0.8, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    noise.connect(filter).connect(g).connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 1.0);
  }
}

// --- Procedural backing track synth (built-in songs only) ---
function midiToFreq(semitoneFromA2) { return 110 * Math.pow(2, semitoneFromA2 / 12); }
function makeDistortionCurve(amount) {
  const k = amount, n = 44100;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((3 + k) * x * 20 * Math.PI / 180) / (Math.PI + k * Math.abs(x));
  }
  return curve;
}
let masterGain, distortion;
function initSongAudioGraph() {
  ensureAudio();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  distortion = audioCtx.createWaveShaper();
  distortion.curve = makeDistortionCurve(28);
  distortion.oversample = '4x';
  distortion.connect(masterGain).connect(audioCtx.destination);
}
function playChordHit(rootSemitone, startTime, dur) {
  const freqs = [midiToFreq(rootSemitone), midiToFreq(rootSemitone+7), midiToFreq(rootSemitone-12)];
  freqs.forEach((f, idx) => {
    const osc = audioCtx.createOscillator();
    osc.type = idx === 2 ? 'sawtooth' : 'square';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    const peak = idx === 2 ? 0.5 : 0.28;
    g.gain.setValueAtTime(0.0001, startTime);
    g.gain.exponentialRampToValueAtTime(peak, startTime + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
    osc.connect(g).connect(distortion);
    osc.start(startTime);
    osc.stop(startTime + dur + 0.05);
  });
}
function scheduleBuiltinBackingTrack(song, startTime) {
  const beatDur = 60 / song.bpm;
  const barDur = beatDur * 4;
  let t = startTime;
  for (let bar = 0; bar < song.bars; bar++) {
    const root = song.progression[bar % song.progression.length];
    for (let e = 0; e < 8; e++) playChordHit(root, t + e * (beatDur/2), beatDur/2 * 0.9);
    t += barDur;
  }
  return t;
}

// ============================================================
// Chart generation — mimics REAL drum playing patterns by genre
// ============================================================
// Genre patterns define, per 8th-note step within a bar (0-7):
//   hihat/ride pattern, snare backbeat positions, and fill behavior.
// This models actual rock drumming: steady hihat pulse + backbeat on 2 & 4,
// toms used for fills, crash accents on phrase starts.
const GENRE_PATTERNS = {
  rock: {
    // Standard 8-beat: hihat every 8th note, snare on 2 & 4
    hihatSteps: [0,1,2,3,4,5,6,7],
    rideOnChorus: false,
    snareSteps: [2, 6], // beat 2 and beat 4 (in 8th-note steps, 0-indexed, 2 steps = 1 beat)
    fillEvery: 4,
    fillDensity: 0.8
  },
  punk: {
    // Fast 16th-note-feel hihat/snare-driven, simpler fills, more energy
    hihatSteps: [0,1,2,3,4,5,6,7],
    rideOnChorus: false,
    snareSteps: [2, 6],
    extraSnareSteps: [1, 5], // punk often adds extra snare hits for drive
    fillEvery: 8,
    fillDensity: 0.5
  },
  hardrock: {
    // Heavier, ride-driven, wider fills, half-time feel possible
    hihatSteps: [0,2,4,6],
    rideOnChorus: true,
    snareSteps: [2, 6],
    fillEvery: 4,
    fillDensity: 1.0
  }
};

function generateChartForBuiltinSong(song, diffKey) {
  const settings = DIFF_SETTINGS[diffKey];
  const pattern = GENRE_PATTERNS[song.genre] || GENRE_PATTERNS.rock;
  const beatDur = 60 / song.bpm;
  const barDur = beatDur * 4;
  const stepDur = beatDur / 2; // 8th note
  const notes = [];
  const tomCycle = ['tom1', 'tom2', 'floortom', 'tom2', 'tom1'];
  let tomIdx = 0;

  for (let bar = 0; bar < song.bars; bar++) {
    const barStart = bar * barDur;
    const isFillBar = (bar % pattern.fillEvery === pattern.fillEvery - 1);
    const useRide = pattern.rideOnChorus && (bar % 8 >= 4);

    // Hihat/ride pulse (thinned by density for easier difficulties)
    if (!isFillBar || Math.random() > 0.5) {
      pattern.hihatSteps.forEach(step => {
        if (Math.random() < (0.5 + settings.density * 0.5)) {
          notes.push({ time: barStart + step * stepDur, lane: useRide ? 'ride' : 'hihat' });
        }
      });
    }

    // Snare backbeat — the anchor of realistic rock drumming, always present
    pattern.snareSteps.forEach(step => {
      notes.push({ time: barStart + step * stepDur, lane: 'snare' });
    });
    if (pattern.extraSnareSteps && settings.density > 0.6) {
      pattern.extraSnareSteps.forEach(step => {
        if (Math.random() < settings.density) notes.push({ time: barStart + step * stepDur, lane: 'snare' });
      });
    }

    // Fills at phrase boundaries — tom run leading into next phrase
    if (isFillBar && Math.random() < pattern.fillDensity * settings.density) {
      const fillSteps = settings.density > 0.8 ? [4,5,6,7] : [5,6,7];
      fillSteps.forEach(step => {
        notes.push({ time: barStart + step * stepDur, lane: tomCycle[tomIdx % tomCycle.length] });
        tomIdx++;
      });
    }

    // Crash accents at phrase starts (every 4 or 8 bars depending on genre)
    const crashInterval = song.genre === 'punk' ? 8 : 4;
    if (bar % crashInterval === 0) {
      notes.push({ time: barStart, lane: 'crash' });
    }
  }

  return finalizeChart(notes);
}

function generateChartFromAnalysis(song, diffKey) {
  const settings = DIFF_SETTINGS[diffKey];
  // Thin the analyzed notes by difficulty density (keep strongest-timed spacing, randomized drop)
  const notes = song.analyzedNotes
    .filter(n => Math.random() < (0.35 + settings.density * 0.65))
    .map(n => ({ time: n.time, lane: n.lane }));
  return finalizeChart(notes);
}

function finalizeChart(notes) {
  notes.sort((a,b) => a.time - b.time);
  const minGap = 0.08;
  const filtered = [];
  const lastTimeByLane = {};
  notes.forEach(n => {
    const last = lastTimeByLane[n.lane] ?? -999;
    if (n.time - last >= minGap) {
      filtered.push({ ...n, judged: false, hit: false, spawned: false });
      lastTimeByLane[n.lane] = n.time;
    }
  });
  return filtered;
}

// ============================================================
// Rhythm game state
// ============================================================
let gameActive = false;
let songStartAudioTime = 0;
let songEndAudioTime = 0;
let songTotalDuration = 0;
let noteTravelTime = 1.6;
let chart = [];
let score = 0, combo = 0, maxCombo = 0;
let countPerfect = 0, countGreat = 0, countGood = 0, countBad = 0, countMiss = 0;
const activeNoteObjects = [];
let currentAudioSourceNode = null;

const NOTE_START_Z = -6.0;
function laneTargetPos(laneName) {
  const dm = laneMap[laneName];
  if (!dm) return new THREE.Vector3(0, 1, -0.5);
  const p = new THREE.Vector3();
  dm.head.getWorldPosition(p);
  return p;
}

async function startGame() {
  ensureAudio();
  score = 0; combo = 0; maxCombo = 0;
  countPerfect = 0; countGreat = 0; countGood = 0; countBad = 0; countMiss = 0;
  updateHud();
  progressBarWrap.style.display = 'block';
  progressBarFill.style.width = '0%';

  const settings = DIFF_SETTINGS[selectedDiff];
  noteTravelTime = 1.6 / settings.speedMul;

  if (selectedSong.builtin) {
    chart = generateChartForBuiltinSong(selectedSong, selectedDiff);
    initSongAudioGraph();
    const now = audioCtx.currentTime + 1.0;
    songStartAudioTime = now;
    songEndAudioTime = scheduleBuiltinBackingTrack(selectedSong, now);
    songTotalDuration = songEndAudioTime - songStartAudioTime;
  } else {
    chart = generateChartFromAnalysis(selectedSong, selectedDiff);
    // Play the actual imported audio file
    const resp = await fetch(selectedSong.audioUrl);
    const arrayBuffer = await resp.arrayBuffer();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffer;
    const gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.7;
    source.connect(gainNode).connect(audioCtx.destination);
    const now = audioCtx.currentTime + 1.0;
    source.start(now);
    currentAudioSourceNode = source;
    songStartAudioTime = now;
    songTotalDuration = audioBuffer.duration;
    songEndAudioTime = now + songTotalDuration;
  }

  gameActive = true;
}

function updateHud() {
  scoreValEl.textContent = score;
  comboValEl.textContent = combo;
  comboDisplayEl.classList.toggle('active', combo >= 10);
}

function showJudgeEffect(text, color) {
  judgeEffectEl.textContent = text;
  judgeEffectEl.style.color = color;
  judgeEffectEl.style.animation = 'none';
  void judgeEffectEl.offsetWidth; // reflow to restart animation
  judgeEffectEl.style.animation = 'judgePop 0.5s ease-out';
}

const JUDGE_COLORS = {
  PERFECT: '#48dbfb',
  GREAT: '#7cfc00',
  GOOD: '#feca57',
  BAD: '#ff9944',
  MISS: '#ff4444'
};

function applyJudgement(kind) {
  // PERFECT/GREAT keep combo; GOOD and below break combo (per spec: "GOOD以下でコンボ途切れ")
  if (kind === 'PERFECT') {
    combo++; maxCombo = Math.max(maxCombo, combo);
    score += 100 + Math.min(50, combo);
    countPerfect++;
  } else if (kind === 'GREAT') {
    combo++; maxCombo = Math.max(maxCombo, combo);
    score += 70 + Math.min(30, combo);
    countGreat++;
  } else if (kind === 'GOOD') {
    combo = 0;
    score += 30;
    countGood++;
  } else if (kind === 'BAD') {
    combo = 0;
    score += 10;
    countBad++;
  } else if (kind === 'MISS') {
    combo = 0;
    countMiss++;
  }
  showJudgeEffect(kind, JUDGE_COLORS[kind]);
  updateHud();
}

function judgeNoteHit(lane) {
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  let best = null, bestDiff = Infinity;
  chart.forEach(n => {
    if (n.judged || n.lane !== lane) return;
    const diff = Math.abs(n.time - nowSong);
    if (diff < bestDiff) { bestDiff = diff; best = n; }
  });
  if (!best) return false;

  // Timing windows (seconds)
  const WINDOWS = [
    ['PERFECT', 0.05],
    ['GREAT', 0.10],
    ['GOOD', 0.16],
    ['BAD', 0.24]
  ];

  for (const [kind, window] of WINDOWS) {
    if (bestDiff <= window) {
      best.judged = true; best.hit = true;
      applyJudgement(kind);
      return true;
    }
  }
  return false;
}

function tickMissDetection() {
  if (!gameActive) return;
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  const MISS_WINDOW = 0.24;
  chart.forEach(n => {
    if (!n.judged && (nowSong - n.time) > MISS_WINDOW) {
      n.judged = true; n.hit = false;
      applyJudgement('MISS');
    }
  });

  // progress bar
  if (songTotalDuration > 0) {
    const progress = Math.min(1, Math.max(0, nowSong / songTotalDuration));
    progressBarFill.style.width = (progress * 100).toFixed(1) + '%';
  }

  if (audioCtx.currentTime > songEndAudioTime + 1.0 && gameActive) {
    endGame();
  }
}

function endGame() {
  gameActive = false;
  const total = countPerfect + countGreat + countGood + countBad + countMiss;
  const weighted = countPerfect*1.0 + countGreat*0.8 + countGood*0.5 + countBad*0.2;
  const accuracy = total > 0 ? ((weighted / total) * 100).toFixed(1) : '0.0';
  document.getElementById('resSong').textContent = selectedSong.title;
  document.getElementById('resScore').textContent = score;
  document.getElementById('resCombo').textContent = maxCombo;
  document.getElementById('resPerfect').textContent = countPerfect;
  document.getElementById('resGreat').textContent = countGreat;
  document.getElementById('resGood').textContent = countGood;
  document.getElementById('resBad').textContent = countBad;
  document.getElementById('resMiss').textContent = countMiss;
  document.getElementById('resAccuracy').textContent = accuracy;
  hud.style.display = 'none';
  progressBarWrap.style.display = 'none';
  resultScreen.style.display = 'flex';

  activeNoteObjects.forEach(o => scene.remove(o.mesh));
  activeNoteObjects.length = 0;
}

// Note visuals
// ============================================================
const noteGeoCache = {};
function getNoteMesh(lane) {
  if (!noteGeoCache[lane]) {
    const color = laneColor(lane);
    const geo = new THREE.SphereGeometry(0.08, 12, 12);
    const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, roughness: 0.3 });
    noteGeoCache[lane] = { geo, mat };
  }
  const cache = noteGeoCache[lane];
  return new THREE.Mesh(cache.geo, cache.mat);
}
function laneColor(lane) {
  const colors = {
    snare: 0xffffff, tom1: 0xff8888, tom2: 0xffaa55,
    floortom: 0xcc8844, hihat: 0x88ffff, crash: 0xffee66, ride: 0xffcc44
  };
  return colors[lane] || 0xffffff;
}

function spawnDueNotes() {
  if (!gameActive) return;
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  chart.forEach(n => {
    if (n.spawned) return;
    if (n.time - nowSong <= noteTravelTime) {
      n.spawned = true;
      const targetPos = laneTargetPos(n.lane);
      const mesh = getNoteMesh(n.lane);
      const startPos = targetPos.clone();
      startPos.z += NOTE_START_Z;
      startPos.y += 0.3;
      mesh.position.copy(startPos);
      scene.add(mesh);
      activeNoteObjects.push({ note: n, mesh, targetPos });
    }
  });
}

function updateNoteVisuals() {
  if (!gameActive) return;
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
    const obj = activeNoteObjects[i];
    const n = obj.note;
    const progress = 1 - (n.time - nowSong) / noteTravelTime;
    if (progress >= 1.15 || n.judged) {
      scene.remove(obj.mesh);
      activeNoteObjects.splice(i, 1);
      continue;
    }
    const startPos = obj.targetPos.clone();
    startPos.z += NOTE_START_Z;
    startPos.y += 0.3;
    obj.mesh.position.lerpVectors(startPos, obj.targetPos, Math.min(1, Math.max(0, progress)));
    obj.mesh.rotation.y += 0.1;
  }
}

function attachStick(controller) {
  const group = new THREE.Group();
  const stickGeo = new THREE.CylinderGeometry(0.008, 0.011, 0.32, 8);
  const stickMat = new THREE.MeshStandardMaterial({ color: 0xd9a066, roughness: 0.6 });
  const stick = new THREE.Mesh(stickGeo, stickMat);
  stick.castShadow = true;
  stick.rotation.x = -Math.PI / 2.1;
  stick.position.set(0, 0.0, -0.14);
  group.add(stick);

  const tip = new THREE.Object3D();
  tip.position.set(0, 0.02, -0.30);
  group.add(tip);
  group.userData.tip = tip;

  controller.add(group);
  controller.userData.stickGroup = group;
  controller.userData.prevTipPos = new THREE.Vector3();
  controller.userData.lastHitTime = {};
}

function buildDrumKit() {
  const standMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.4 });

  drumDefs.forEach(def => {
    const group = new THREE.Group();
    group.position.set(def.pos[0], def.pos[1], def.pos[2]);

    let bodyHeight = (def.type === 'cymbal' || def.type === 'hihat') ? 0.02 : 0.26;
    if (def.type === 'floortom') bodyHeight = 0.32;

    if (def.type !== 'cymbal' && def.type !== 'hihat') {
      const shellGeo = new THREE.CylinderGeometry(def.radius, def.radius, bodyHeight, 24);
      const shellColor = def.type === 'floortom' ? 0x5a3a1a : 0xcc3333;
      const shellMat = new THREE.MeshStandardMaterial({ color: shellColor, roughness: 0.5, metalness: 0.1 });
      const shell = new THREE.Mesh(shellGeo, shellMat);
      shell.position.y = -bodyHeight / 2;
      shell.castShadow = true; shell.receiveShadow = true;
      group.add(shell);
    }

    const headGeo = new THREE.CylinderGeometry(def.radius, def.radius, 0.02, 32);
    const headMat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.7, metalness: (def.type === 'cymbal' || def.type === 'hihat') ? 0.8 : 0.0 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.castShadow = true; head.receiveShadow = true;
    group.add(head);

    const poleHeight = def.pos[1];
    const poleGeo = new THREE.CylinderGeometry(0.015, 0.015, poleHeight, 8);
    const pole = new THREE.Mesh(poleGeo, standMat);
    pole.position.set(def.pos[0], -def.pos[1] / 2 - ((def.type === 'cymbal' || def.type === 'hihat') ? 0.01 : bodyHeight), def.pos[2]);
    pole.castShadow = true;
    scene.add(pole);

    scene.add(group);

    const entry = { def, group, head, originalY: head.position.y, hitAnim: 0 };
    drumMeshes.push(entry);
    laneMap[def.lane] = entry;
  });

  const seatGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.05, 20);
  const seatMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  const seat = new THREE.Mesh(seatGeo, seatMat);
  seat.position.set(0, 0.5, 0.35);
  seat.castShadow = true;
  scene.add(seat);
  const seatPole = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.5,8), seatMat);
  seatPole.position.set(0, 0.25, 0.35);
  scene.add(seatPole);
}

// ============================================================
// Hit detection
// ============================================================
const tmpTipWorld = new THREE.Vector3();

function checkHits(controller, dt) {
  if (!controller.userData.stickGroup) return;
  const tip = controller.userData.stickGroup.userData.tip;
  tip.getWorldPosition(tmpTipWorld);

  const prev = controller.userData.prevTipPos;
  if (prev.lengthSq() === 0) { prev.copy(tmpTipWorld); return; }

  const velocity = tmpTipWorld.clone().sub(prev).divideScalar(Math.max(dt, 0.0001));
  const speed = velocity.length();

  drumMeshes.forEach(dm => {
    const headWorldPos = new THREE.Vector3();
    dm.head.getWorldPosition(headWorldPos);
    const dx = tmpTipWorld.x - headWorldPos.x;
    const dz = tmpTipWorld.z - headWorldPos.z;
    const distXZ = Math.sqrt(dx*dx + dz*dz);
    const yDiff = tmpTipWorld.y - headWorldPos.y;

    const withinRadius = distXZ < dm.def.radius * 1.1;
    const nearSurface = Math.abs(yDiff) < 0.05;
    const crossedDownward = (prev.y - headWorldPos.y) > 0 && yDiff <= 0.02;

    const now = performance.now();
    const lastHit = controller.userData.lastHitTime[dm.def.name] || 0;
    const cooldownOk = (now - lastHit) > 120;

    if (withinRadius && nearSurface && crossedDownward && cooldownOk && speed > 0.3) {
      controller.userData.lastHitTime[dm.def.name] = now;
      const velocityFactor = Math.min(1.0, speed / 4.0);
      playDrumSound(dm.def.type, velocityFactor, dm.def.pitch || 1.0);
      dm.hitAnim = 1.0;
      triggerHaptic(controller, Math.min(1.0, 0.4 + velocityFactor * 0.6), 60);

      if (gameActive) judgeNoteHit(dm.def.lane);
    }
  });

  prev.copy(tmpTipWorld);
}

function triggerHaptic(controller, intensity, duration) {
  const session = renderer.xr.getSession && renderer.xr.getSession();
  if (!session) return;
  for (const source of session.inputSources) {
    if (source && source.gamepad && source.gamepad.hapticActuators && source.gamepad.hapticActuators.length > 0) {
      try { source.gamepad.hapticActuators[0].pulse(intensity, duration); } catch (e) {}
    }
  }
}

// ============================================================
// Render loop
// ============================================================
function render() {
  const dt = clock.getDelta();

  checkHits(controller0, dt);
  checkHits(controller1, dt);

  if (gameActive) {
    spawnDueNotes();
    updateNoteVisuals();
    tickMissDetection();
  }

  drumMeshes.forEach(dm => {
    if (dm.hitAnim > 0) {
      dm.hitAnim -= dt * 6;
      if (dm.hitAnim < 0) dm.hitAnim = 0;
      const scale = 1 - dm.hitAnim * 0.06;
      dm.head.scale.set(1, scale, 1);
      dm.head.position.y = dm.originalY - dm.hitAnim * 0.01;
    } else {
      dm.head.scale.set(1, 1, 1);
      dm.head.position.y = dm.originalY;
    }
  });

  renderer.render(scene, camera);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// WebXR bootstrap
// ============================================================
init();

if ('xr' in navigator) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      enterBtn.disabled = false;
      enterBtn.textContent = 'VRモードで開始';
    } else {
      enterBtn.textContent = 'VR非対応の端末です';
      statusEl.textContent = 'このブラウザ/端末はimmersive-vrに対応していません。';
    }
  }).catch(err => {
    enterBtn.textContent = 'VR確認エラー';
    statusEl.textContent = String(err);
  });
} else {
  enterBtn.textContent = 'WebXR非対応ブラウザ';
  statusEl.textContent = 'Quest 3sのブラウザ(Meta Quest Browser)でアクセスしてください。https接続が必要です。';
}

enterBtn.addEventListener('click', async () => {
  ensureAudio();
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
    });
    renderer.xr.setSession(session);
    overlay.style.display = 'none';
    hud.style.display = 'block';

    session.addEventListener('end', () => {
      gameActive = false;
      if (currentAudioSourceNode) { try { currentAudioSourceNode.stop(); } catch(e){} }
      overlay.style.display = 'flex';
      hud.style.display = 'none';
      progressBarWrap.style.display = 'none';
      resultScreen.style.display = 'none';
    });

    session.addEventListener('inputsourceschange', (evt) => {
      evt.added.forEach(src => {
        if (src.handedness === 'left') controller0.userData.handedness = 'left';
        if (src.handedness === 'right') controller1.userData.handedness = 'right';
      });
    });

    setTimeout(() => { startGame(); }, 800);
  } catch (err) {
    statusEl.textContent = 'VRセッション開始に失敗しました: ' + err.message;
  }
});
</script>
