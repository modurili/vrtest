<script type="module">
import * as THREE from 'three';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

// ============================================================
// UI state
// ============================================================
const overlay = document.getElementById('overlay');
const enterBtn = document.getElementById('enterVR');
const statusEl = document.getElementById('status');
const hud = document.getElementById('hud');
const resultScreen = document.getElementById('resultScreen');
const scoreValEl = document.getElementById('scoreVal');
const comboValEl = document.getElementById('comboVal');
const judgeTextEl = document.getElementById('judgeText');

// ------------------------------------------------------------
// Songs: fully original, royalty-free, generated in-browser.
// Each song = chord progression + BPM + style params used by the synth.
// No external audio files, no copyrighted melodies — 100% procedural.
// ------------------------------------------------------------
const SONGS = [
  {
    id: 'garage',
    title: 'Garage Ignition',
    subtitle: 'ミドルテンポ・パワーコード',
    bpm: 128,
    bars: 24,
    // chord roots in semitones from A2, drives the bass/guitar synth riff
    progression: [0, 0, 5, 7, 0, 0, 5, 3],
    style: 'punchy'
  },
  {
    id: 'highway',
    title: 'Highway Overdrive',
    subtitle: 'アップテンポ・疾走感',
    bpm: 150,
    bars: 28,
    progression: [0, 5, 3, 7, 0, 5, 8, 7],
    style: 'driving'
  },
  {
    id: 'stadium',
    title: 'Stadium Anthem',
    subtitle: 'ミッドテンポ・壮大',
    bpm: 112,
    bars: 20,
    progression: [0, 7, 5, 5, 3, 7, 0, 0],
    style: 'anthem'
  }
];

let selectedSong = SONGS[0];
let selectedDiff = 'normal';

const DIFF_SETTINGS = {
  easy:   { density: 0.45, speedMul: 0.85, label: '簡単' },
  normal: { density: 0.7,  speedMul: 1.0,  label: '普通' },
  hard:   { density: 1.0,  speedMul: 1.2,  label: '難しい' }
};

// Build song selection buttons
const songChoicesEl = document.getElementById('songChoices');
SONGS.forEach((song, i) => {
  const btn = document.createElement('button');
  btn.className = 'choice-btn' + (i === 0 ? ' selected' : '');
  btn.innerHTML = `${song.title}<small>${song.subtitle} / BPM${song.bpm}</small>`;
  btn.addEventListener('click', () => {
    selectedSong = song;
    [...songChoicesEl.children].forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
  });
  songChoicesEl.appendChild(btn);
});

const diffChoicesEl = document.getElementById('diffChoices');
[...diffChoicesEl.children].forEach(btn => {
  btn.addEventListener('click', () => {
    selectedDiff = btn.dataset.diff;
    [...diffChoicesEl.children].forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

document.getElementById('backToMenu').addEventListener('click', () => {
  resultScreen.style.display = 'none';
  overlay.style.display = 'flex';
});

// ============================================================
// Three.js / WebXR setup
// ============================================================
let scene, camera, renderer;
let controller0, controller1, controllerGrip0, controllerGrip1;
const clock = new THREE.Clock();

const drumDefs = [
  { name: 'snare',   pos: [0, 0.85, -0.45], radius: 0.18, color: 0xdedede, type: 'snare',   lane: 'snare' },
  { name: 'tom1',    pos: [-0.28, 0.95, -0.65], radius: 0.14, color: 0xffffff, type: 'tom', pitch: 1.3, lane: 'tom1' },
  { name: 'tom2',    pos: [0.05, 0.95, -0.72], radius: 0.15, color: 0xffffff, type: 'tom', pitch: 1.0, lane: 'tom2' },
  { name: 'tom3',    pos: [0.38, 0.90, -0.65], radius: 0.16, color: 0xffffff, type: 'tom', pitch: 0.75, lane: 'tom3' },
  { name: 'floorTom',pos: [0.55, 0.55, -0.25], radius: 0.20, color: 0x8b5a2b, type: 'floortom', lane: 'floortom' },
  { name: 'hihat',   pos: [-0.55, 0.95, -0.15], radius: 0.16, color: 0xC0C0C0, type: 'hihat', lane: 'hihat' },
  { name: 'crash',   pos: [-0.55, 1.35, -0.55], radius: 0.20, color: 0xffd76a, type: 'cymbal', pitch: 1.15, lane: 'crash' },
  { name: 'ride',    pos: [0.65, 1.25, -0.65], radius: 0.22, color: 0xffd76a, type: 'cymbal', pitch: 0.85, lane: 'ride' },
  { name: 'kick',    pos: [0, 0.35, -0.85], radius: 0.24, color: 0x222222, type: 'kick', lane: 'kick' }
];
const drumMeshes = [];
const laneMap = {}; // lane name -> drumMesh entry

// ============================================================
// Audio engine (Web Audio API) — drum hit sounds + procedural song synth
// ============================================================
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playDrumSound(type, velocity = 1.0, pitch = 1.0) {
  ensureAudio();
  const t = audioCtx.currentTime;
  const vol = Math.min(1.0, 0.4 + velocity * 0.6);

  if (type === 'kick') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
    gain.gain.setValueAtTime(vol * 1.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.4);
  } else if (type === 'snare') {
    const bufferSize = audioCtx.sampleRate * 0.2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = audioCtx.createBiquadFilter();
    noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 1000;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(vol, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    noise.connect(noiseFilter).connect(noiseGain).connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 0.2);

    const osc = audioCtx.createOscillator();
    osc.type = 'triangle'; osc.frequency.setValueAtTime(200, t);
    const oscGain = audioCtx.createGain();
    oscGain.gain.setValueAtTime(vol * 0.5, t);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(oscGain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.12);
  } else if (type === 'tom' || type === 'floortom') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    const baseFreq = (type === 'floortom' ? 90 : 180) * pitch;
    osc.frequency.setValueAtTime(baseFreq, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, t + 0.25);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.45);
  } else if (type === 'hihat') {
    const bufferSize = audioCtx.sampleRate * 0.1;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 7000;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol * 0.7, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    noise.connect(filter).connect(g).connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 0.1);
  } else if (type === 'cymbal') {
    const bufferSize = audioCtx.sampleRate * 1.0;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 6000 * pitch; filter.Q.value = 0.6;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol * 0.8, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
    noise.connect(filter).connect(g).connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 1.0);
  }
}

// --- Backing track synth: distorted power-chord guitar riff + bass, purely procedural ---
function midiToFreq(semitoneFromA2) {
  // A2 = 110Hz base
  return 110 * Math.pow(2, semitoneFromA2 / 12);
}

function makeDistortionCurve(amount) {
  const k = amount;
  const n = 44100;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((3 + k) * x * 20 * Math.PI / 180) / (Math.PI + k * Math.abs(x));
  }
  return curve;
}

let masterGain, distortion, songNodesActive = [];

function initSongAudioGraph() {
  ensureAudio();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.35;
  distortion = audioCtx.createWaveShaper();
  distortion.curve = makeDistortionCurve(28);
  distortion.oversample = '4x';
  distortion.connect(masterGain).connect(audioCtx.destination);
}

function playChordHit(rootSemitone, startTime, dur, style) {
  // Power chord = root + fifth, run through distortion
  const freqs = [midiToFreq(rootSemitone), midiToFreq(rootSemitone + 7), midiToFreq(rootSemitone - 12)];
  freqs.forEach((f, idx) => {
    const osc = audioCtx.createOscillator();
    osc.type = idx === 2 ? 'sawtooth' : 'square';
    osc.frequency.value = f;
    const g = audioCtx.createGain();
    const peak = idx === 2 ? 0.5 : 0.28;
    g.gain.setValueAtTime(0.0001, startTime);
    g.gain.exponentialRampToValueAtTime(peak, startTime + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
    osc.connect(g).connect(distortion);
    osc.start(startTime);
    osc.stop(startTime + dur + 0.05);
  });
}

// Schedules the whole song's backing track ahead of time using precise Web Audio timing.
function scheduleSong(song, startTime) {
  const beatDur = 60 / song.bpm;
  const barDur = beatDur * 4;
  let t = startTime;
  for (let bar = 0; bar < song.bars; bar++) {
    const root = song.progression[bar % song.progression.length];
    // 8th-note power chord chugs (palm-mute style rock rhythm)
    for (let e = 0; e < 8; e++) {
      const hitTime = t + e * (beatDur / 2);
      const isAccent = (e === 0 || e === 4);
      playChordHit(root, hitTime, beatDur / 2 * 0.9, song.style);
    }
    t += barDur;
  }
  return t; // end time
}

// ============================================================
// Rhythm game state
// ============================================================
let gameActive = false;
let songStartAudioTime = 0;
let songEndAudioTime = 0;
let noteTravelTime = 1.6; // seconds for a note to travel from spawn to hit point
let chart = []; // { time, lane, hit: bool, judged: bool }
let score = 0, combo = 0, maxCombo = 0;
let countPerfect = 0, countGood = 0, countMiss = 0;
const activeNoteObjects = []; // { note, mesh }

const NOTE_START_Z = -6.0; // spawn far in front
function laneTargetPos(laneName) {
  const dm = laneMap[laneName];
  if (!dm) return new THREE.Vector3(0, 1, -0.5);
  const p = new THREE.Vector3();
  dm.head.getWorldPosition(p);
  return p;
}

// Auto-generate a chart (note pattern) from the song's structure & difficulty
function generateChart(song, diffKey) {
  const settings = DIFF_SETTINGS[diffKey];
  const beatDur = 60 / song.bpm;
  const barDur = beatDur * 4;
  const notes = [];
  const lanesCycle = ['snare', 'tom1', 'tom2', 'tom3', 'floortom'];
  let cycleIdx = 0;

  for (let bar = 0; bar < song.bars; bar++) {
    const barStart = bar * barDur;
    // Kick on beat 1 & 3 always (anchor)
    notes.push({ time: barStart, lane: 'kick' });
    notes.push({ time: barStart + beatDur * 2, lane: 'kick' });

    // Hihat/ride 8th notes depending on density
    for (let e = 0; e < 8; e++) {
      if (Math.random() < settings.density * 0.55) {
        const lane = (bar % 8 === 7 && e >= 6) ? 'crash' : (bar % 4 === 3 ? 'ride' : 'hihat');
        notes.push({ time: barStart + e * (beatDur / 2), lane });
      }
    }

    // Snare backbeat on 2 & 4
    notes.push({ time: barStart + beatDur, lane: 'snare' });
    notes.push({ time: barStart + beatDur * 3, lane: 'snare' });

    // Fill every 4 bars using toms, scaled by density
    if (bar % 4 === 3 && Math.random() < settings.density) {
      for (let f = 0; f < 4; f++) {
        notes.push({ time: barStart + beatDur * 3 + f * (beatDur / 4), lane: lanesCycle[cycleIdx % lanesCycle.length] });
        cycleIdx++;
      }
    }

    // Crash on downbeat of first bar and every 8 bars
    if (bar === 0 || bar % 8 === 0) {
      notes.push({ time: barStart, lane: 'crash' });
    }
  }

  notes.sort((a, b) => a.time - b.time);
  // remove near-duplicate same-lane notes that are too close (avoid unplayable spam)
  const minGap = 0.09;
  const filtered = [];
  const lastTimeByLane = {};
  notes.forEach(n => {
    const last = lastTimeByLane[n.lane] ?? -999;
    if (n.time - last >= minGap) {
      filtered.push({ ...n, judged: false, hit: false });
      lastTimeByLane[n.lane] = n.time;
    }
  });
  return filtered;
}

function startGame() {
  ensureAudio();
  initSongAudioGraph();
  chart = generateChart(selectedSong, selectedDiff);
  score = 0; combo = 0; maxCombo = 0;
  countPerfect = 0; countGood = 0; countMiss = 0;
  updateHud();

  const settings = DIFF_SETTINGS[selectedDiff];
  noteTravelTime = 1.6 / settings.speedMul;

  const now = audioCtx.currentTime + 1.0; // 1s countdown buffer
  songStartAudioTime = now;
  songEndAudioTime = scheduleSong(selectedSong, now);

  gameActive = true;
}

function updateHud() {
  scoreValEl.textContent = score;
  comboValEl.textContent = combo;
}

function showJudgement(text, color) {
  judgeTextEl.textContent = text;
  judgeTextEl.style.color = color;
  clearTimeout(showJudgement._t);
  showJudgement._t = setTimeout(() => { judgeTextEl.textContent = ''; }, 300);
}

function judgeNoteHit(lane) {
  // find nearest unjudged note in this lane within timing window
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  let best = null, bestDiff = Infinity;
  chart.forEach(n => {
    if (n.judged || n.lane !== lane) return;
    const diff = Math.abs(n.time - nowSong);
    if (diff < bestDiff) { bestDiff = diff; best = n; }
  });
  if (!best) return false;

  const PERFECT_WINDOW = 0.09;
  const GOOD_WINDOW = 0.20;

  if (bestDiff <= PERFECT_WINDOW) {
    best.judged = true; best.hit = true;
    combo++; maxCombo = Math.max(maxCombo, combo);
    score += 100 + Math.min(50, combo);
    countPerfect++;
    showJudgement('PERFECT', '#48dbfb');
    updateHud();
    return true;
  } else if (bestDiff <= GOOD_WINDOW) {
    best.judged = true; best.hit = true;
    combo++; maxCombo = Math.max(maxCombo, combo);
    score += 50 + Math.min(20, combo);
    countGood++;
    showJudgement('GOOD', '#feca57');
    updateHud();
    return true;
  }
  return false;
}

function tickMissDetection() {
  if (!gameActive) return;
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  const MISS_WINDOW = 0.20;
  chart.forEach(n => {
    if (!n.judged && (nowSong - n.time) > MISS_WINDOW) {
      n.judged = true; n.hit = false;
      combo = 0;
      countMiss++;
      showJudgement('MISS', '#ff6b6b');
      updateHud();
    }
  });

  if (audioCtx.currentTime > songEndAudioTime + 1.0 && gameActive) {
    endGame();
  }
}

function endGame() {
  gameActive = false;
  const total = countPerfect + countGood + countMiss;
  const accuracy = total > 0 ? (((countPerfect + countGood * 0.5) / total) * 100).toFixed(1) : '0.0';
  document.getElementById('resSong').textContent = selectedSong.title;
  document.getElementById('resScore').textContent = score;
  document.getElementById('resCombo').textContent = maxCombo;
  document.getElementById('resPerfect').textContent = countPerfect;
  document.getElementById('resGood').textContent = countGood;
  document.getElementById('resMiss').textContent = countMiss;
  document.getElementById('resAccuracy').textContent = accuracy;
  hud.style.display = 'none';
  resultScreen.style.display = 'flex';

  // clear remaining visual notes
  activeNoteObjects.forEach(o => scene.remove(o.mesh));
  activeNoteObjects.length = 0;
}

// ============================================================
// Note visuals: spawn a small glowing disc that flies from far away
// toward the corresponding drum pad.
// ============================================================
const noteGeoCache = {};
function getNoteMesh(lane) {
  if (!noteGeoCache[lane]) {
    const color = laneColor(lane);
    const geo = new THREE.SphereGeometry(0.08, 12, 12);
    const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.6, roughness: 0.3 });
    noteGeoCache[lane] = { geo, mat };
  }
  const cache = noteGeoCache[lane];
  const mesh = new THREE.Mesh(cache.geo, cache.mat);
  return mesh;
}
function laneColor(lane) {
  const colors = {
    snare: 0xffffff, tom1: 0xff8888, tom2: 0xffaa55, tom3: 0xffdd55,
    floortom: 0xcc8844, hihat: 0x88ffff, crash: 0xffee66, ride: 0xffcc44, kick: 0xff4444
  };
  return colors[lane] || 0xffffff;
}

function spawnDueNotes() {
  if (!gameActive) return;
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  chart.forEach(n => {
    if (n.spawned) return;
    if (n.time - nowSong <= noteTravelTime) {
      n.spawned = true;
      const targetPos = laneTargetPos(n.lane);
      const mesh = getNoteMesh(n.lane);
      const startPos = targetPos.clone();
      startPos.z += NOTE_START_Z;
      startPos.y += 0.3;
      mesh.position.copy(startPos);
      scene.add(mesh);
      activeNoteObjects.push({ note: n, mesh, targetPos, spawnSongTime: nowSong });
    }
  });
}

function updateNoteVisuals() {
  if (!gameActive) { return; }
  const nowSong = audioCtx.currentTime - songStartAudioTime;
  for (let i = activeNoteObjects.length - 1; i >= 0; i--) {
    const obj = activeNoteObjects[i];
    const n = obj.note;
    const progress = 1 - (n.time - nowSong) / noteTravelTime; // 0 at spawn, 1 at hit time
    if (progress >= 1.15 || n.judged) {
      scene.remove(obj.mesh);
      activeNoteObjects.splice(i, 1);
      continue;
    }
    const startPos = obj.targetPos.clone();
    startPos.z += NOTE_START_Z;
    startPos.y += 0.3;
    obj.mesh.position.lerpVectors(startPos, obj.targetPos, Math.min(1, Math.max(0, progress)));
    obj.mesh.rotation.y += 0.1;
  }
}

// ============================================================
// Scene / controllers setup (drum kit reused from base simulator)
// ============================================================
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x141420);
  scene.fog = new THREE.Fog(0x141420, 4, 12);

  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
  camera.position.set(0, 1.6, 1.2);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const hemi = new THREE.HemisphereLight(0xffffff, 0x333344, 1.0);
  scene.add(hemi);
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(2, 4, 2);
  dir.castShadow = true;
  dir.shadow.mapSize.set(1024, 1024);
  scene.add(dir);

  const spot = new THREE.SpotLight(0xfff2cc, 1.5, 8, Math.PI / 6, 0.4);
  spot.position.set(0, 3.5, 0.5);
  spot.target.position.set(0, 0.8, -0.5);
  scene.add(spot); scene.add(spot.target);

  const floorGeo = new THREE.CircleGeometry(6, 48);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a35, roughness: 0.9 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  const rugGeo = new THREE.CircleGeometry(1.4, 32);
  const rugMat = new THREE.MeshStandardMaterial({ color: 0x7a1f2b, roughness: 1.0 });
  const rug = new THREE.Mesh(rugGeo, rugMat);
  rug.rotation.x = -Math.PI / 2;
  rug.position.set(0, 0.001, -0.4);
  rug.receiveShadow = true;
  scene.add(rug);

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a24, roughness: 1.0, side: THREE.BackSide });
  const room = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 12), wallMat);
  room.position.y = 3;
  scene.add(room);

  // Long note-lane guide "runway" visual to hint incoming notes
  const runwayGeo = new THREE.PlaneGeometry(3.5, 6);
  const runwayMat = new THREE.MeshBasicMaterial({ color: 0x2a2a55, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
  const runway = new THREE.Mesh(runwayGeo, runwayMat);
  runway.rotation.x = -Math.PI / 2;
  runway.position.set(0, 1.0, -3.5);
  scene.add(runway);

  buildDrumKit();

  const controllerModelFactory = new XRControllerModelFactory();
  controller0 = renderer.xr.getController(0);
  controller1 = renderer.xr.getController(1);
  scene.add(controller0); scene.add(controller1);

  controllerGrip0 = renderer.xr.getControllerGrip(0);
  controllerGrip0.add(controllerModelFactory.createControllerModel(controllerGrip0));
  scene.add(controllerGrip0);

  controllerGrip1 = renderer.xr.getControllerGrip(1);
  controllerGrip1.add(controllerModelFactory.createControllerModel(controllerGrip1));
  scene.add(controllerGrip1);

  attachStick(controller0);
  attachStick(controller1);

  window.addEventListener('resize', onWindowResize);
  renderer.setAnimationLoop(render);
}

function attachStick(controller) {
  const group = new THREE.Group();
  const stickGeo = new THREE.CylinderGeometry(0.008, 0.011, 0.32, 8);
  const stickMat = new THREE.MeshStandardMaterial({ color: 0xd9a066, roughness: 0.6 });
  const stick = new THREE.Mesh(stickGeo, stickMat);
  stick.castShadow = true;
  stick.rotation.x = -Math.PI / 2.1;
  stick.position.set(0, 0.0, -0.14);
  group.add(stick);

  const tip = new THREE.Object3D();
  tip.position.set(0, 0.02, -0.30);
  group.add(tip);
  group.userData.tip = tip;

  controller.add(group);
  controller.userData.stickGroup = group;
  controller.userData.prevTipPos = new THREE.Vector3();
  controller.userData.lastHitTime = {};
}

function buildDrumKit() {
  const standMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.4 });

  drumDefs.forEach(def => {
    const group = new THREE.Group();
    group.position.set(def.pos[0], def.pos[1], def.pos[2]);

    let bodyHeight = def.type === 'cymbal' || def.type === 'hihat' ? 0.02 : 0.26;
    if (def.type === 'kick') bodyHeight = 0.4;
    if (def.type === 'floortom') bodyHeight = 0.32;

    if (def.type !== 'cymbal' && def.type !== 'hihat') {
      const shellGeo = new THREE.CylinderGeometry(def.radius, def.radius, bodyHeight, 24);
      const shellColor = def.type === 'kick' ? 0x111111 : (def.type === 'floortom' ? 0x5a3a1a : 0xcc3333);
      const shellMat = new THREE.MeshStandardMaterial({ color: shellColor, roughness: 0.5, metalness: 0.1 });
      const shell = new THREE.Mesh(shellGeo, shellMat);
      shell.position.y = -bodyHeight / 2;
      shell.castShadow = true; shell.receiveShadow = true;
      group.add(shell);
    }

    const headGeo = new THREE.CylinderGeometry(def.radius, def.radius, 0.02, 32);
    const headMat = new THREE.MeshStandardMaterial({ color: def.color, roughness: 0.7, metalness: def.type === 'cymbal' || def.type === 'hihat' ? 0.8 : 0.0 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.castShadow = true; head.receiveShadow = true;
    group.add(head);

    if (def.type !== 'kick') {
      const poleHeight = def.pos[1];
      const poleGeo = new THREE.CylinderGeometry(0.015, 0.015, poleHeight, 8);
      const pole = new THREE.Mesh(poleGeo, standMat);
      pole.position.set(def.pos[0], -def.pos[1] / 2 - (def.type === 'cymbal' || def.type === 'hihat' ? 0.01 : bodyHeight), def.pos[2]);
      pole.castShadow = true;
      scene.add(pole);
    }

    scene.add(group);

    const entry = { def, group, head, originalY: head.position.y, hitAnim: 0 };
    drumMeshes.push(entry);
    laneMap[def.lane] = entry;
  });

  const seatGeo = new THREE.CylinderGeometry(0.18, 0.18, 0.05, 20);
  const seatMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
  const seat = new THREE.Mesh(seatGeo, seatMat);
  seat.position.set(0, 0.5, 0.35);
  seat.castShadow = true;
  scene.add(seat);
  const seatPole = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.5,8), seatMat);
  seatPole.position.set(0, 0.25, 0.35);
  scene.add(seatPole);
}

// ============================================================
// Hit detection (extends base version: also triggers rhythm judging)
// ============================================================
const tmpTipWorld = new THREE.Vector3();

function checkHits(controller, dt) {
  if (!controller.userData.stickGroup) return;
  const tip = controller.userData.stickGroup.userData.tip;
  tip.getWorldPosition(tmpTipWorld);

  const prev = controller.userData.prevTipPos;
  if (prev.lengthSq() === 0) { prev.copy(tmpTipWorld); return; }

  const velocity = tmpTipWorld.clone().sub(prev).divideScalar(Math.max(dt, 0.0001));
  const speed = velocity.length();

  drumMeshes.forEach(dm => {
    const headWorldPos = new THREE.Vector3();
    dm.head.getWorldPosition(headWorldPos);
    const dx = tmpTipWorld.x - headWorldPos.x;
    const dz = tmpTipWorld.z - headWorldPos.z;
    const distXZ = Math.sqrt(dx * dx + dz * dz);
    const yDiff = tmpTipWorld.y - headWorldPos.y;

    const withinRadius = distXZ < dm.def.radius * 1.1;
    const nearSurface = Math.abs(yDiff) < 0.05;
    const crossedDownward = (prev.y - headWorldPos.y) > 0 && yDiff <= 0.02;

    const now = performance.now();
    const lastHit = controller.userData.lastHitTime[dm.def.name] || 0;
    const cooldownOk = (now - lastHit) > 120;

    if (withinRadius && nearSurface && crossedDownward && cooldownOk && speed > 0.3) {
      controller.userData.lastHitTime[dm.def.name] = now;
      const velocityFactor = Math.min(1.0, speed / 4.0);
      playDrumSound(dm.def.type, velocityFactor, dm.def.pitch || 1.0);
      dm.hitAnim = 1.0;
      triggerHaptic(controller, Math.min(1.0, 0.4 + velocityFactor * 0.6), 60);

      if (gameActive) {
        judgeNoteHit(dm.def.lane);
      }
    }
  });

  prev.copy(tmpTipWorld);
}

function triggerHaptic(controller, intensity, duration) {
  const session = renderer.xr.getSession && renderer.xr.getSession();
  if (!session) return;
  for (const source of session.inputSources) {
    if (source && source.gamepad && source.gamepad.hapticActuators && source.gamepad.hapticActuators.length > 0) {
      try { source.gamepad.hapticActuators[0].pulse(intensity, duration); } catch (e) {}
    }
  }
}

// ============================================================
// Render loop
// ============================================================
function render() {
  const dt = clock.getDelta();

  checkHits(controller0, dt);
  checkHits(controller1, dt);

  if (gameActive) {
    spawnDueNotes();
    updateNoteVisuals();
    tickMissDetection();
  }

  drumMeshes.forEach(dm => {
    if (dm.hitAnim > 0) {
      dm.hitAnim -= dt * 6;
      if (dm.hitAnim < 0) dm.hitAnim = 0;
      const scale = 1 - dm.hitAnim * 0.06;
      dm.head.scale.set(1, scale, 1);
      dm.head.position.y = dm.originalY - dm.hitAnim * 0.01;
    } else {
      dm.head.scale.set(1, 1, 1);
      dm.head.position.y = dm.originalY;
    }
  });

  renderer.render(scene, camera);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// WebXR bootstrap
// ============================================================
init();

if ('xr' in navigator) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      enterBtn.disabled = false;
      enterBtn.textContent = 'VRモードで開始';
    } else {
      enterBtn.textContent = 'VR非対応の端末です';
      statusEl.textContent = 'このブラウザ/端末はimmersive-vrに対応していません。';
    }
  }).catch(err => {
    enterBtn.textContent = 'VR確認エラー';
    statusEl.textContent = String(err);
  });
} else {
  enterBtn.textContent = 'WebXR非対応ブラウザ';
  statusEl.textContent = 'Quest 3sのブラウザ(Meta Quest Browser)でアクセスしてください。https接続が必要です。';
}

enterBtn.addEventListener('click', async () => {
  ensureAudio();
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking']
    });
    renderer.xr.setSession(session);
    overlay.style.display = 'none';
    hud.style.display = 'block';

    session.addEventListener('end', () => {
      gameActive = false;
      overlay.style.display = 'flex';
      hud.style.display = 'none';
      resultScreen.style.display = 'none';
    });

    session.addEventListener('inputsourceschange', (evt) => {
      evt.added.forEach(src => {
        if (src.handedness === 'left') controller0.userData.handedness = 'left';
        if (src.handedness === 'right') controller1.userData.handedness = 'right';
      });
    });

    // Small delay so the player can get oriented before the song starts
    setTimeout(() => { startGame(); }, 800);
  } catch (err) {
    statusEl.textContent = 'VRセッション開始に失敗しました: ' + err.message;
  }
});
</script>
